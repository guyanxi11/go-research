<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GoResearch · Phase 1 Chat</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0b1020;
      --bg-2: #0d1330;
      --panel: #131a31;
      --border: #233056;
      --text: #e8ecf7;
      --muted: #8b96b8;
      --accent: #7c9cff;
      --accent-soft: rgba(124, 156, 255, 0.15);
      --user: #2a3768;
      --assistant: #1a2244;
      --danger: #ff6b6b;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(160deg, #0b1020 0%, #131a31 100%);
      color: var(--text);
      display: flex;
      justify-content: center;
    }
    .app {
      width: 100%;
      max-width: 880px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0 16px;
    }
    header {
      padding: 18px 4px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    header .title h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0.4px;
    }
    header .title p {
      margin: 2px 0 0;
      font-size: 12px;
      color: var(--muted);
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      margin-left: 8px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.4px;
      vertical-align: 2px;
    }
    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .btn {
      padding: 7px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s ease, opacity 0.15s ease;
    }
    .btn:hover { background: var(--panel); }
    .btn.primary {
      background: var(--accent);
      color: #0b1020;
      border-color: transparent;
      font-weight: 600;
    }
    .btn.primary:disabled { opacity: 0.55; cursor: progress; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 4px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .messages::-webkit-scrollbar { width: 8px; }
    .messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    .msg {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .msg.user { justify-content: flex-end; }
    .bubble {
      max-width: 78%;
      padding: 11px 14px;
      border-radius: 14px;
      line-height: 1.62;
      font-size: 14.5px;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid var(--border);
    }
    .msg.user .bubble {
      background: var(--user);
      border-color: transparent;
      border-top-right-radius: 4px;
    }
    .msg.assistant .bubble {
      background: var(--assistant);
      border-top-left-radius: 4px;
    }
    .msg.assistant .bubble.error {
      border-color: var(--danger);
      color: #ffb4b4;
    }
    .role {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .meta-line {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    .composer {
      padding: 12px 4px 18px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .composer-inner {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      transition: border-color 0.15s ease;
    }
    .composer-inner:focus-within { border-color: var(--accent); }
    textarea {
      flex: 1;
      min-height: 40px;
      max-height: 200px;
      padding: 6px 4px;
      background: transparent;
      border: none;
      color: var(--text);
      font: inherit;
      font-size: 14.5px;
      line-height: 1.55;
      resize: none;
      outline: none;
    }
    .send-status {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      padding: 4px 4px 0;
      font-size: 11px;
      color: var(--muted);
    }
    .typing-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      margin-left: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1s infinite ease-in-out;
    }
    @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

    .empty {
      color: var(--muted);
      text-align: center;
      margin-top: 18vh;
      font-size: 14px;
    }
    .empty h2 {
      margin: 0 0 8px;
      font-size: 18px;
      color: var(--text);
      font-weight: 600;
    }
    .examples {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 14px;
    }
    .example {
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
    }
    .example:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="title">
        <h1>GoResearch <span class="badge">Phase 1</span></h1>
        <p>Hertz + Eino · 多轮会话 · SSE 流式</p>
      </div>
      <div class="actions">
        <span id="model" class="meta-line"></span>
        <button id="new-chat" class="btn">新建会话</button>
      </div>
    </header>

    <div id="messages" class="messages">
      <div id="empty" class="empty">
        <h2>开始一段对话</h2>
        <div>会话内的所有上下文都会随每条消息一起带给模型。</div>
        <div class="examples">
          <button class="example">用三段话讲清楚 Raft 的 leader election</button>
          <button class="example">写一个 Go 的令牌桶限流器示例</button>
          <button class="example">解释一下 Go 的 GMP 调度模型</button>
        </div>
      </div>
    </div>

    <div class="composer">
      <div class="composer-inner">
        <textarea id="input"
          placeholder="问点什么…  Enter 发送，Shift+Enter 换行"
          rows="1"></textarea>
        <button id="send" class="btn primary">发送</button>
      </div>
      <div class="send-status">
        <span id="status">就绪</span>
        <span id="counter"></span>
      </div>
    </div>
  </div>

  <script>
    const $messages = document.getElementById("messages");
    const $empty = document.getElementById("empty");
    const $input = document.getElementById("input");
    const $send = document.getElementById("send");
    const $newChat = document.getElementById("new-chat");
    const $status = document.getElementById("status");
    const $counter = document.getElementById("counter");
    const $model = document.getElementById("model");

    // 会话内记忆：每条消息发送时都把历史一起带上。Phase 3 会替换为
    // 后端持久化会话 + pgvector 长期记忆。
    const history = [];
    let inFlight = false;

    fetch("/healthz").then(r => r.json())
      .then(j => { $model.textContent = j.model ? `model: ${j.model}` : ""; })
      .catch(() => {});

    document.querySelectorAll(".example").forEach(el => {
      el.addEventListener("click", () => {
        $input.value = el.textContent;
        $input.focus();
        autoGrow();
      });
    });

    function autoGrow() {
      $input.style.height = "auto";
      $input.style.height = Math.min($input.scrollHeight, 200) + "px";
    }
    $input.addEventListener("input", autoGrow);
    $input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey && !e.isComposing) {
        e.preventDefault();
        send();
      }
    });
    $send.addEventListener("click", send);
    $newChat.addEventListener("click", () => {
      if (inFlight) return;
      history.length = 0;
      $messages.querySelectorAll(".msg").forEach(n => n.remove());
      $empty.style.display = "";
      $status.textContent = "已清空会话";
      $counter.textContent = "";
    });

    function appendMessage(role, text) {
      $empty.style.display = "none";
      const wrap = document.createElement("div");
      wrap.className = "msg " + role;
      const col = document.createElement("div");
      const r = document.createElement("div");
      r.className = "role";
      r.textContent = role === "user" ? "你" : "助手";
      const b = document.createElement("div");
      b.className = "bubble";
      b.textContent = text;
      col.appendChild(r);
      col.appendChild(b);
      wrap.appendChild(col);
      $messages.appendChild(wrap);
      $messages.scrollTop = $messages.scrollHeight;
      return b;
    }

    async function send() {
      if (inFlight) return;
      const message = $input.value.trim();
      if (!message) return;

      appendMessage("user", message);
      const $bubble = appendMessage("assistant", "");
      $bubble.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';

      const payload = { message, history: history.slice() };
      history.push({ role: "user", content: message });

      $input.value = "";
      autoGrow();
      inFlight = true;
      $send.disabled = true;
      $newChat.disabled = true;
      $status.textContent = "请求中…";
      $counter.textContent = "";

      const startedAt = performance.now();
      let firstTokenAt = 0;
      let chars = 0;
      let assistantText = "";

      try {
        const resp = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Accept": "text/event-stream" },
          body: JSON.stringify(payload)
        });
        if (!resp.ok || !resp.body) {
          renderError($bubble, `请求失败：${resp.status} ${resp.statusText}`);
          return;
        }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          let idx;
          while ((idx = buffer.indexOf("\n\n")) !== -1) {
            const raw = buffer.slice(0, idx);
            buffer = buffer.slice(idx + 2);
            handleEvent(raw);
          }
        }

        if (assistantText) {
          history.push({ role: "assistant", content: assistantText });
        }
        const elapsed = Math.round(performance.now() - startedAt);
        const ttft = firstTokenAt ? Math.round(firstTokenAt - startedAt) : -1;
        $status.textContent = `完成 · 历史 ${history.length} 条`;
        $counter.textContent = `首 token ${ttft}ms · 总耗时 ${elapsed}ms · 输出 ${chars} 字`;
      } catch (err) {
        renderError($bubble, `[stream error] ${err}`);
      } finally {
        inFlight = false;
        $send.disabled = false;
        $newChat.disabled = false;
      }

      function handleEvent(raw) {
        const lines = raw.split("\n");
        let event = "message";
        let data = "";
        for (const line of lines) {
          if (line.startsWith("event:")) event = line.slice(6).trim();
          else if (line.startsWith("data:")) data += line.slice(5).trim();
        }
        if (event === "token") {
          try {
            const obj = JSON.parse(data);
            if (!firstTokenAt) {
              firstTokenAt = performance.now();
              $bubble.textContent = "";
            }
            assistantText += obj.delta || "";
            chars += (obj.delta || "").length;
            $bubble.textContent = assistantText;
            $messages.scrollTop = $messages.scrollHeight;
          } catch (_) { /* ignore */ }
        } else if (event === "error") {
          renderError($bubble, `[server error] ${data}`);
        }
      }

      function renderError(bubble, text) {
        bubble.textContent = text;
        bubble.classList.add("error");
        $status.textContent = "出错";
      }
    }
  </script>
</body>
</html>
