<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GoResearch · Phase 3</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0b1020;
      --bg-2: #0d1330;
      --panel: #131a31;
      --panel-2: #182142;
      --border: #233056;
      --text: #e8ecf7;
      --muted: #8b96b8;
      --accent: #7c9cff;
      --accent-soft: rgba(124, 156, 255, 0.15);
      --user: #2a3768;
      --assistant: #1a2244;
      --success: #65d39c;
      --warning: #f5c065;
      --danger: #ff6b6b;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(160deg, #0b1020 0%, #131a31 100%);
      color: var(--text);
      display: flex;
      justify-content: center;
    }
    .app {
      width: 100%;
      max-width: 980px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0 18px;
    }

    /* ===== Header / Tabs ===== */
    header {
      padding: 18px 4px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 10px;
      flex-shrink: 0;
    }
    .brand h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0.4px;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      margin-left: 8px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.4px;
      vertical-align: 2px;
    }
    .brand p {
      margin: 2px 0 12px;
      font-size: 12px;
      color: var(--muted);
    }
    .tabs {
      display: flex;
      gap: 4px;
    }
    .tab {
      padding: 9px 16px;
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .tab:hover { color: var(--text); background: var(--panel); }
    .tab.active {
      background: var(--panel);
      color: var(--text);
      border-color: var(--border);
      box-shadow: 0 1px 0 var(--panel);
    }
    .tab .model {
      font-size: 11px;
      color: var(--muted);
      margin-left: 8px;
      font-weight: normal;
    }

    /* ===== View switching ===== */
    .view { display: none; flex-direction: column; flex: 1; min-height: 0; }
    .view.active { display: flex; }

    /* ===== Buttons / inputs (shared) ===== */
    .btn {
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s ease, opacity 0.15s ease;
    }
    .btn:hover { background: var(--panel); }
    .btn.primary {
      background: var(--accent);
      color: #0b1020;
      border-color: transparent;
      font-weight: 600;
    }
    .btn.primary:disabled { opacity: 0.55; cursor: progress; }
    textarea, input[type=text] {
      width: 100%;
      padding: 11px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-2);
      color: var(--text);
      font: inherit;
      font-size: 14.5px;
      line-height: 1.55;
      outline: none;
    }
    textarea:focus, input[type=text]:focus { border-color: var(--accent); }
    textarea { min-height: 40px; max-height: 200px; resize: none; }

    /* ===== Chat view (Phase 1, kept) ===== */
    #chat-view .messages {
      flex: 1;
      overflow-y: auto;
      padding: 22px 4px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .messages::-webkit-scrollbar { width: 8px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg.user { justify-content: flex-end; }
    .bubble {
      max-width: 78%;
      padding: 11px 14px;
      border-radius: 14px;
      line-height: 1.62;
      font-size: 14.5px;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid var(--border);
    }
    .msg.user .bubble { background: var(--user); border-color: transparent; border-top-right-radius: 4px; }
    .msg.assistant .bubble { background: var(--assistant); border-top-left-radius: 4px; }
    .msg.assistant .bubble.error { border-color: var(--danger); color: #ffb4b4; }
    .role { font-size: 11px; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.5px; text-transform: uppercase; }
    .typing-dot {
      display: inline-block;
      width: 6px; height: 6px;
      margin-left: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1s infinite ease-in-out;
    }
    @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

    #chat-view .composer {
      padding: 12px 4px 18px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .composer-inner {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      transition: border-color 0.15s ease;
    }
    .composer-inner:focus-within { border-color: var(--accent); }
    .composer-inner textarea {
      flex: 1;
      padding: 6px 4px;
      background: transparent;
      border: none;
      min-height: 40px;
    }
    .send-status {
      display: flex; gap: 10px; align-items: center; justify-content: space-between;
      padding: 4px 4px 0;
      font-size: 11px; color: var(--muted);
    }

    /* ===== Research view ===== */
    #research-view {
      gap: 14px;
      padding: 18px 4px 24px;
      overflow-y: auto;
    }
    #research-view::-webkit-scrollbar { width: 8px; }
    #research-view::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
    }
    .card h3 {
      margin: 0 0 10px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .card h3 .count {
      background: var(--accent-soft);
      color: var(--accent);
      padding: 1px 8px;
      border-radius: 999px;
      font-size: 11px;
      letter-spacing: 0.3px;
    }

    .ask-row {
      display: flex; gap: 10px; align-items: stretch;
    }
    .ask-row textarea { flex: 1; min-height: 56px; }
    .ask-row .btn.primary { align-self: stretch; padding-left: 22px; padding-right: 22px; }

    .meta-row {
      display: flex; flex-wrap: wrap; gap: 14px;
      font-size: 12px; color: var(--muted);
    }
    .meta-row .key { color: var(--text); font-weight: 600; }

    #plan-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
    }
    .subtask {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      cursor: pointer;
      transition: border-color 0.15s ease;
    }
    .subtask:hover { border-color: var(--accent); }
    .subtask-head {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px;
    }
    .subtask-id {
      background: var(--accent-soft);
      color: var(--accent);
      padding: 1px 7px;
      border-radius: 999px;
      font-weight: 600;
    }
    .subtask-state {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-left: auto;
      font-size: 11px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
    .dot.pending { background: var(--muted); }
    .dot.running { background: var(--accent); animation: blink 1s infinite ease-in-out; }
    .dot.done { background: var(--success); }
    .dot.failed { background: var(--danger); }
    .subtask-question {
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
    }
    .subtask-elapsed {
      font-size: 11px;
      color: var(--muted);
    }

    #findings-panels {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .finding {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .finding-head {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
      font-size: 13.5px;
    }
    .finding-head:hover { background: rgba(124, 156, 255, 0.05); }
    .finding-head .arrow {
      width: 12px;
      transition: transform 0.15s ease;
      color: var(--muted);
    }
    .finding.open .arrow { transform: rotate(90deg); }
    .finding-body {
      display: none;
      padding: 4px 16px 16px;
      border-top: 1px solid var(--border);
      font-size: 14px;
      line-height: 1.65;
    }
    .finding.open .finding-body { display: block; }
    .finding-body .citations {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px dashed var(--border);
      font-size: 12px;
      color: var(--muted);
    }
    .finding-body .citations a { color: var(--accent); text-decoration: none; }
    .finding-body .citations a:hover { text-decoration: underline; }

    #report {
      min-height: 80px;
      font-size: 15px;
      line-height: 1.75;
    }
    #report.placeholder {
      color: var(--muted);
      font-style: italic;
    }
    #report h1, #report h2, #report h3 { color: var(--text); margin: 1.2em 0 0.4em; }
    #report h1 { font-size: 22px; }
    #report h2 { font-size: 18px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    #report h3 { font-size: 15px; color: var(--muted); }
    #report ul, #report ol { padding-left: 22px; }
    #report li { margin: 4px 0; }
    #report code {
      background: var(--bg-2);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
    }
    #report pre {
      background: var(--bg-2);
      padding: 12px 14px;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--border);
    }
    #report a { color: var(--accent); text-decoration: none; }
    #report a:hover { text-decoration: underline; }
    #report blockquote {
      border-left: 3px solid var(--accent);
      padding: 0 12px;
      margin: 10px 0;
      color: var(--muted);
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 40px 0;
      font-size: 14px;
    }

    .examples {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .example {
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--bg-2);
      color: var(--text);
      font-size: 12.5px;
      cursor: pointer;
    }
    .example:hover { border-color: var(--accent); color: var(--accent); }

    /* ===== History view ===== */
    #history-view {
      gap: 14px;
      padding: 18px 4px 24px;
      overflow-y: auto;
    }
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-item {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color 0.15s ease;
    }
    .history-item:hover { border-color: var(--accent); }
    .history-item.active { border-color: var(--accent); background: var(--accent-soft); }
    .history-q { font-size: 14px; line-height: 1.5; margin-bottom: 6px; }
    .history-meta { font-size: 11px; color: var(--muted); display: flex; gap: 12px; flex-wrap: wrap; }
    .status-pill {
      padding: 1px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .status-pill.completed { background: rgba(101, 211, 156, 0.15); color: var(--success); }
    .status-pill.running { background: var(--accent-soft); color: var(--accent); }
    .status-pill.failed { background: rgba(255, 107, 107, 0.15); color: var(--danger); }
    #history-detail .placeholder { color: var(--muted); font-size: 14px; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <h1>GoResearch <span class="badge">Phase 3</span></h1>
        <p>Hertz + Eino · Postgres 持久化 · Redis 缓存 · 多 Agent SSE</p>
      </div>
      <div class="tabs">
        <button class="tab active" data-view="chat">Chat<span class="model" id="model-chat"></span></button>
        <button class="tab" data-view="research">Research</button>
        <button class="tab" data-view="history">History</button>
      </div>
    </header>

    <!-- =========================== CHAT VIEW =========================== -->
    <section id="chat-view" class="view active">
      <div id="chat-messages" class="messages">
        <div id="chat-empty" class="empty">
          <div style="font-size:18px;color:var(--text);font-weight:600;margin-bottom:6px;">开始一段对话</div>
          <div>同一标签页内的多轮上下文会带给模型。Research 模式在右上角切换。</div>
        </div>
      </div>
      <div class="composer">
        <div class="composer-inner">
          <textarea id="chat-input" placeholder="问点什么…  Enter 发送，Shift+Enter 换行" rows="1"></textarea>
          <button id="chat-send" class="btn primary">发送</button>
        </div>
        <div class="send-status">
          <span id="chat-status">就绪</span>
          <span id="chat-counter"></span>
        </div>
      </div>
    </section>

    <!-- ========================= RESEARCH VIEW ========================= -->
    <section id="research-view" class="view">
      <div class="card">
        <h3>研究问题</h3>
        <div class="ask-row">
          <textarea id="research-input" placeholder="例如：比较 Go goroutine 与 OS 线程，从内存、调度、使用场景三个角度展开" rows="2"></textarea>
          <button id="research-go" class="btn primary">开始研究</button>
        </div>
        <div class="examples" id="research-examples">
          <button class="example">比较 Go goroutine 与 OS 线程，从内存、调度、使用场景三个角度展开</button>
          <button class="example">Raft 协议是怎么解决 split-brain 的？请给出关键步骤</button>
          <button class="example">为什么 Kubernetes 的 controller manager 是 leader-elect 单实例工作？</button>
        </div>
      </div>

      <div class="card">
        <h3>研究计划 <span class="count" id="plan-count">—</span></h3>
        <div id="plan-list">
          <div class="empty">尚未开始。提交一个问题，Planner 会先拆解出 2-5 个并发可调度的子任务。</div>
        </div>
      </div>

      <div class="card" id="findings-card" style="display:none;">
        <h3>子任务发现 <span class="count" id="findings-count">0</span></h3>
        <div id="findings-panels"></div>
      </div>

      <div class="card">
        <h3>研究报告 <span class="count" id="report-meta">—</span></h3>
        <div id="report" class="placeholder">报告将在所有子任务完成后由 Writer 流式生成。</div>
      </div>
    </section>

    <!-- ========================= HISTORY VIEW ========================= -->
    <section id="history-view" class="view">
      <div class="card">
        <h3>研究历史 <span class="count" id="history-count">—</span></h3>
        <div id="history-list" class="history-list">
          <div class="empty">加载中…（需 Postgres：`make up`）</div>
        </div>
      </div>
      <div class="card" id="history-detail">
        <h3>历史详情</h3>
        <div id="history-detail-body" class="placeholder">点击左侧一条记录查看完整报告。</div>
      </div>
    </section>
  </div>

  <script>
    // ===================== Common: model badge =========================
    fetch("/healthz").then(r => r.json())
      .then(j => {
        let badge = "";
        if (j.model) badge += " · " + j.model;
        if (j.search === "tavily") badge += " · Tavily";
        else if (j.search === "mock") badge += " · Mock搜索";
        document.getElementById("model-chat").textContent = badge;
      }).catch(() => {});

    // ===================== Tab switching ==============================
    document.querySelectorAll(".tab").forEach(t => {
      t.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(x => x.classList.toggle("active", x === t));
        const target = t.dataset.view;
        document.querySelectorAll(".view").forEach(v => v.classList.toggle("active", v.id === target + "-view"));
        if (target === "history") loadHistoryList();
      });
    });

    // ===================== Marked init (Markdown render) ==============
    if (window.marked) {
      marked.setOptions({ breaks: true, gfm: true });
    }
    function renderMd(text) {
      if (window.marked) return marked.parse(text);
      // Fallback: very small replacements so the report still reads OK if CDN blocked.
      return text
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/^### (.+)$/gm, "<h3>$1</h3>")
        .replace(/^## (.+)$/gm, "<h2>$1</h2>")
        .replace(/^# (.+)$/gm, "<h1>$1</h1>")
        .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
        .replace(/\n/g, "<br>");
    }

    // ===================== Shared SSE parser ==========================
    async function streamSSE(url, body, onEvent) {
      const resp = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "text/event-stream" },
        body: JSON.stringify(body),
      });
      if (!resp.ok || !resp.body) throw new Error(`HTTP ${resp.status} ${resp.statusText}`);
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        let idx;
        while ((idx = buffer.indexOf("\n\n")) !== -1) {
          const raw = buffer.slice(0, idx);
          buffer = buffer.slice(idx + 2);
          let event = "message", data = "";
          for (const line of raw.split("\n")) {
            if (line.startsWith("event:")) event = line.slice(6).trim();
            else if (line.startsWith("data:")) data += line.slice(5).trim();
          }
          if (data) onEvent(event, data);
        }
      }
    }

    // ===================== Chat view (Phase 1, polished) ==============
    const chatHistory = [];
    let chatInFlight = false;
    const $cinput = document.getElementById("chat-input");
    const $csend = document.getElementById("chat-send");
    const $cmsgs = document.getElementById("chat-messages");
    const $cempty = document.getElementById("chat-empty");
    const $cstatus = document.getElementById("chat-status");
    const $ccounter = document.getElementById("chat-counter");

    function chatGrow() {
      $cinput.style.height = "auto";
      $cinput.style.height = Math.min($cinput.scrollHeight, 200) + "px";
    }
    $cinput.addEventListener("input", chatGrow);
    $cinput.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey && !e.isComposing) { e.preventDefault(); chatSend(); }
    });
    $csend.addEventListener("click", chatSend);

    function chatAppend(role, text) {
      $cempty.style.display = "none";
      const wrap = document.createElement("div");
      wrap.className = "msg " + role;
      const col = document.createElement("div");
      const r = document.createElement("div");
      r.className = "role";
      r.textContent = role === "user" ? "你" : "助手";
      const b = document.createElement("div");
      b.className = "bubble";
      b.textContent = text;
      col.append(r, b);
      wrap.append(col);
      $cmsgs.appendChild(wrap);
      $cmsgs.scrollTop = $cmsgs.scrollHeight;
      return b;
    }

    async function chatSend() {
      if (chatInFlight) return;
      const message = $cinput.value.trim();
      if (!message) return;
      chatAppend("user", message);
      const $b = chatAppend("assistant", "");
      $b.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
      const payload = { message, history: chatHistory.slice() };
      chatHistory.push({ role: "user", content: message });
      $cinput.value = ""; chatGrow();
      chatInFlight = true; $csend.disabled = true;
      $cstatus.textContent = "请求中…"; $ccounter.textContent = "";

      const startedAt = performance.now();
      let firstTokenAt = 0, chars = 0, assistantText = "";
      try {
        await streamSSE("/api/chat", { message, history: payload.history }, (event, data) => {
          if (event === "token") {
            try {
              const obj = JSON.parse(data);
              if (!firstTokenAt) { firstTokenAt = performance.now(); $b.textContent = ""; }
              assistantText += obj.delta || "";
              chars += (obj.delta || "").length;
              $b.textContent = assistantText;
              $cmsgs.scrollTop = $cmsgs.scrollHeight;
            } catch (_) {}
          } else if (event === "error") {
            $b.textContent = `[server error] ${data}`;
            $b.classList.add("error");
          }
        });
        if (assistantText) chatHistory.push({ role: "assistant", content: assistantText });
        const elapsed = Math.round(performance.now() - startedAt);
        const ttft = firstTokenAt ? Math.round(firstTokenAt - startedAt) : -1;
        $cstatus.textContent = `完成 · 历史 ${chatHistory.length} 条`;
        $ccounter.textContent = `首 token ${ttft}ms · 总耗时 ${elapsed}ms · 输出 ${chars} 字`;
      } catch (err) {
        $b.textContent += `\n[stream error] ${err}`;
        $b.classList.add("error");
        $cstatus.textContent = "出错";
      } finally {
        chatInFlight = false;
        $csend.disabled = false;
      }
    }

    // ===================== Research view ==============================
    const $rinput = document.getElementById("research-input");
    const $rgo = document.getElementById("research-go");
    const $planList = document.getElementById("plan-list");
    const $planCount = document.getElementById("plan-count");
    const $findingsCard = document.getElementById("findings-card");
    const $findingsPanels = document.getElementById("findings-panels");
    const $findingsCount = document.getElementById("findings-count");
    const $report = document.getElementById("report");
    const $reportMeta = document.getElementById("report-meta");
    let researchInFlight = false;

    document.querySelectorAll("#research-examples .example").forEach(el => {
      el.addEventListener("click", () => { $rinput.value = el.textContent; $rinput.focus(); });
    });
    $rgo.addEventListener("click", researchStart);
    $rinput.addEventListener("keydown", e => {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) { e.preventDefault(); researchStart(); }
    });

    function resetResearch() {
      $planList.innerHTML = "";
      $planCount.textContent = "—";
      $findingsCard.style.display = "none";
      $findingsPanels.innerHTML = "";
      $findingsCount.textContent = "0";
      $report.textContent = "Planner 正在规划…";
      $report.classList.add("placeholder");
      $reportMeta.textContent = "—";
    }

    function makeSubtaskCard(st) {
      const card = document.createElement("div");
      card.className = "subtask";
      card.dataset.id = st.id;
      card.innerHTML = `
        <div class="subtask-head">
          <span class="subtask-id">${escapeHtml(st.id)}</span>
          <span class="subtask-state"><span class="dot pending"></span><span class="state-label">等待</span></span>
        </div>
        <div class="subtask-question">${escapeHtml(st.question)}</div>
        <div class="subtask-elapsed"></div>
      `;
      card.addEventListener("click", () => {
        const f = document.querySelector(`.finding[data-id="${st.id}"]`);
        if (f) {
          f.classList.add("open");
          f.scrollIntoView({ behavior: "smooth", block: "center" });
        }
      });
      return card;
    }

    function setSubtaskState(id, state, label, elapsedMs) {
      const card = document.querySelector(`.subtask[data-id="${id}"]`);
      if (!card) return;
      card.querySelector(".dot").className = "dot " + state;
      card.querySelector(".state-label").textContent = label;
      if (elapsedMs !== undefined) {
        card.querySelector(".subtask-elapsed").textContent = `耗时 ${elapsedMs}ms`;
      }
    }

    function appendFinding(payload) {
      $findingsCard.style.display = "";
      const wrap = document.createElement("div");
      wrap.className = "finding";
      wrap.dataset.id = payload.id;
      const head = document.createElement("div");
      head.className = "finding-head";
      head.innerHTML = `
        <span class="arrow">▶</span>
        <span class="subtask-id">${escapeHtml(payload.id)}</span>
        <span>${escapeHtml(payload.question)}</span>
        <span class="subtask-state" style="margin-left:auto;"><span class="dot done"></span><span>${payload.elapsed_ms}ms</span></span>
      `;
      head.addEventListener("click", () => wrap.classList.toggle("open"));
      const body = document.createElement("div");
      body.className = "finding-body";
      body.innerHTML = renderMd(payload.findings || "");
      if (Array.isArray(payload.citations) && payload.citations.length) {
        const cites = document.createElement("div");
        cites.className = "citations";
        cites.innerHTML = "<strong>引用：</strong><br>" + payload.citations.map(c =>
          `[${c.index}] <a href="${escapeAttr(c.url)}" target="_blank" rel="noopener">${escapeHtml(c.title || c.url)}</a>`
        ).join("<br>");
        body.appendChild(cites);
      }
      wrap.append(head, body);
      $findingsPanels.appendChild(wrap);
      $findingsCount.textContent = $findingsPanels.children.length;
    }

    let researchMarkdown = "";
    let researchRenderRaf = 0;
    function scheduleReportRender() {
      if (researchRenderRaf) return;
      researchRenderRaf = requestAnimationFrame(() => {
        researchRenderRaf = 0;
        $report.innerHTML = renderMd(researchMarkdown);
      });
    }

    async function researchStart() {
      if (researchInFlight) return;
      const question = $rinput.value.trim();
      if (!question) return;
      researchInFlight = true;
      $rgo.disabled = true;
      resetResearch();

      const startedAt = performance.now();
      let firstTokenAt = 0, chars = 0;
      researchMarkdown = "";
      const subtaskAttempts = {};

      try {
        await streamSSE("/api/research", { question }, (event, data) => {
          let payload = {};
          try { payload = JSON.parse(data); } catch (_) {}

          if (event === "plan") {
            $planList.innerHTML = "";
            (payload.subtasks || []).forEach(st => $planList.appendChild(makeSubtaskCard(st)));
            $planCount.textContent = (payload.subtasks || []).length;

          } else if (event === "node_started") {
            subtaskAttempts[payload.id] = payload.attempt;
            const label = payload.attempt > 1 ? `重试 #${payload.attempt}` : "进行中";
            setSubtaskState(payload.id, "running", label);

          } else if (event === "node_finished") {
            setSubtaskState(payload.id, "done", "完成", payload.elapsed_ms);
            appendFinding(payload);

          } else if (event === "node_failed") {
            setSubtaskState(payload.id, "failed", "失败");

          } else if (event === "writer_token") {
            if (!firstTokenAt) {
              firstTokenAt = performance.now();
              $report.classList.remove("placeholder");
              $report.textContent = "";
            }
            researchMarkdown += payload.delta || "";
            chars += (payload.delta || "").length;
            scheduleReportRender();

          } else if (event === "session") {
            // persisted session id (Phase 3); shown in meta for debugging
            if (payload.id) {
              $reportMeta.textContent = `session ${payload.id.slice(0, 8)}…`;
            }

          } else if (event === "done") {
            const total = performance.now() - startedAt;
            const ttwt = firstTokenAt ? Math.round(firstTokenAt - startedAt) : -1;
            $reportMeta.textContent = `${payload.chars} 字 · 首 writer token ${ttwt}ms · 总耗时 ${Math.round(total)}ms`;
            $report.innerHTML = renderMd(researchMarkdown);

          } else if (event === "error") {
            $report.classList.remove("placeholder");
            $report.innerHTML = `<div style="color:var(--danger)"><strong>错误：</strong>${escapeHtml(JSON.stringify(payload))}</div>`;
          }
        });
      } catch (err) {
        $report.classList.remove("placeholder");
        $report.innerHTML = `<div style="color:var(--danger)">stream error: ${escapeHtml(String(err))}</div>`;
      } finally {
        researchInFlight = false;
        $rgo.disabled = false;
      }
    }

    // ===================== History view (Phase 3) =====================
    const $historyList = document.getElementById("history-list");
    const $historyCount = document.getElementById("history-count");
    const $historyDetail = document.getElementById("history-detail-body");
    let historyLoaded = false;

    async function loadHistoryList() {
      $historyList.innerHTML = '<div class="empty">加载中…</div>';
      try {
        const resp = await fetch("/api/research?limit=30");
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        const items = data.items || [];
        $historyCount.textContent = String(items.length);
        if (!items.length) {
          $historyList.innerHTML = '<div class="empty">暂无记录。在 Research 页完成一次研究后会出现在这里。</div>';
          return;
        }
        $historyList.innerHTML = "";
        items.forEach(item => {
          const el = document.createElement("div");
          el.className = "history-item";
          el.dataset.id = item.id;
          const when = item.created_at ? new Date(item.created_at).toLocaleString() : "";
          const pillClass = item.status || "running";
          el.innerHTML = `
            <div class="history-q">${escapeHtml(item.question)}</div>
            <div class="history-meta">
              <span class="status-pill ${pillClass}">${escapeHtml(item.status)}</span>
              <span>${when}</span>
              ${item.char_count ? `<span>${item.char_count} 字</span>` : ""}
            </div>
          `;
          el.addEventListener("click", () => loadHistoryDetail(item.id, el));
          $historyList.appendChild(el);
        });
        historyLoaded = true;
      } catch (err) {
        $historyList.innerHTML = `<div class="empty" style="color:var(--danger)">加载失败：${escapeHtml(String(err))}<br>请先 <code>make up</code> 启动 Postgres，再 <code>make run</code>。</div>`;
      }
    }

    async function loadHistoryDetail(id, el) {
      document.querySelectorAll(".history-item").forEach(x => x.classList.remove("active"));
      if (el) el.classList.add("active");
      $historyDetail.innerHTML = '<div class="placeholder">加载中…</div>';
      try {
        const resp = await fetch(`/api/research/${id}`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const det = await resp.json();
        let html = `<div class="meta-row" style="margin-bottom:12px;">
          <span><span class="key">状态</span> ${escapeHtml(det.status)}</span>
          <span><span class="key">问题</span> ${escapeHtml(det.question)}</span>
        </div>`;
        if (det.tasks && det.tasks.length) {
          html += `<h4 style="margin:12px 0 8px;color:var(--muted);font-size:12px;">子任务 (${det.tasks.length})</h4>`;
          det.tasks.forEach(t => {
            html += `<div class="finding open" style="margin-bottom:8px;">
              <div class="finding-head"><span class="subtask-id">${escapeHtml(t.task_id)}</span> ${escapeHtml(t.question)}</div>
              <div class="finding-body">${renderMd(t.findings || "(无 findings)")}</div>
            </div>`;
          });
        }
        html += `<h4 style="margin:16px 0 8px;color:var(--muted);font-size:12px;">报告</h4>`;
        html += det.report ? renderMd(det.report) : '<span class="placeholder">(无报告)</span>';
        if (det.error_message) {
          html += `<div style="color:var(--danger);margin-top:12px;">${escapeHtml(det.error_message)}</div>`;
        }
        $historyDetail.innerHTML = html;
      } catch (err) {
        $historyDetail.innerHTML = `<div style="color:var(--danger)">${escapeHtml(String(err))}</div>`;
      }
    }

    function escapeHtml(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
    function escapeAttr(s) { return escapeHtml(s).replace(/"/g, "&quot;"); }
  </script>
</body>
</html>
