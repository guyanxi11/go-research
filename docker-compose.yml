services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: go-research-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-research}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-research}
      POSTGRES_DB: ${POSTGRES_DB:-research}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-research} -d ${POSTGRES_DB:-research}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: go-research-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Scrapes go-research's /metrics endpoint. host.docker.internal is
  # available on Docker Desktop (Win/Mac); for Linux add an extra_hosts
  # entry mapping it to host-gateway (commented below).
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: go-research-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

  # Jaeger all-in-one receives OTLP/HTTP on :4318 and exposes the trace UI on
  # :16686. Configure go-research with OTEL_EXPORTER_OTLP_ENDPOINT=localhost:4318
  # (and OTEL_EXPORTER_OTLP_INSECURE=true for the no-TLS local setup).
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: go-research-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # UI
      - "4318:4318"    # OTLP/HTTP receiver

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
